<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌲 长沙松雅湖 · 水杉夕阳</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #1a0a02;
    font-family: 'STKaiti', 'KaiTi', serif;
    overflow-x: hidden;
  }

  .canvas {
    position: relative;
    width: 900px;
    height: 600px;
    overflow: hidden;
    border-radius: 16px;
    box-shadow: 0 0 60px rgba(255, 140, 30, 0.3), 0 0 120px rgba(200, 80, 20, 0.15);
  }

  /* ===== 天空渐变 ===== */
  .sky {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      #1a237e 0%,      /* 深蓝夜空顶部 */
      #283593 8%,
      #5c3d6e 20%,     /* 紫调过渡 */
      #c44e52 38%,     /* 玫瑰红 */
      #e8753a 50%,     /* 橙红 */
      #f5a623 58%,     /* 金色 */
      #ffd89b 68%,     /* 暖金 */
      #ffe8c8 76%      /* 浅金 */
    );
    animation: skyShift 20s ease-in-out infinite alternate;
  }

  @keyframes skyShift {
    0% { filter: saturate(1) brightness(1); }
    100% { filter: saturate(1.15) brightness(1.05); }
  }

  /* ===== 太阳 ===== */
  .sun {
    position: absolute;
    top: 42%;
    left: 62%;
    width: 80px;
    height: 80px;
    background: radial-gradient(circle, #fffbe6 0%, #ffe08a 30%, #f5a623 60%, transparent 70%);
    border-radius: 50%;
    box-shadow:
      0 0 40px rgba(255, 210, 80, 0.8),
      0 0 80px rgba(255, 180, 40, 0.5),
      0 0 150px rgba(255, 150, 30, 0.3),
      0 0 250px rgba(255, 120, 20, 0.15);
    animation: sunGlow 4s ease-in-out infinite alternate;
  }

  @keyframes sunGlow {
    0% { box-shadow: 0 0 40px rgba(255, 210, 80, 0.8), 0 0 80px rgba(255, 180, 40, 0.5), 0 0 150px rgba(255, 150, 30, 0.3); }
    100% { box-shadow: 0 0 55px rgba(255, 220, 100, 0.9), 0 0 100px rgba(255, 190, 50, 0.6), 0 0 180px rgba(255, 160, 40, 0.4); }
  }

  /* ===== 远山 ===== */
  .mountains {
    position: absolute;
    bottom: 35%;
    left: 0;
    width: 100%;
    height: 30%;
  }

  .mountain {
    position: absolute;
    bottom: 0;
    width: 0;
    height: 0;
    border-style: solid;
  }

  .mountain-1 {
    left: -5%;
    border-width: 0 280px 200px;
    border-color: transparent transparent #3d2b4a transparent;
    opacity: 0.7;
  }
  .mountain-2 {
    left: 20%;
    border-width: 0 340px 240px;
    border-color: transparent transparent #4a2d5c transparent;
    opacity: 0.75;
  }
  .mountain-3 {
    left: 50%;
    border-width: 0 300px 210px;
    border-color: transparent transparent #3b2550 transparent;
    opacity: 0.65;
  }
  .mountain-4 {
    left: 65%;
    border-width: 0 260px 180px;
    border-color: transparent transparent #2d1a3e transparent;
    opacity: 0.7;
  }

  /* ===== 湖面 ===== */
  .lake {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 35%;
    background: linear-gradient(
      180deg,
      #c4705a 0%,
      #8e4a5e 15%,
      #5a3d6e 40%,
      #3a2d5e 70%,
      #2a2050 100%
    );
    border-top: 2px solid rgba(255, 200, 150, 0.2);
  }

  /* ===== 水波纹 ===== */
  .ripple {
    position: absolute;
    height: 2px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(255, 200, 150, 0.15) 20%,
      rgba(255, 180, 120, 0.3) 50%,
      rgba(255, 200, 150, 0.15) 80%,
      transparent 100%
    );
    animation: rippleDrift 6s ease-in-out infinite;
  }

  @keyframes rippleDrift {
    0%, 100% { opacity: 0.3; transform: translateX(0); }
    50% { opacity: 0.7; transform: translateX(15px); }
  }

  /* ===== 太阳倒影 ===== */
  .sun-reflection {
    position: absolute;
    bottom: 5%;
    left: 58%;
    width: 60px;
    height: 120px;
    background: linear-gradient(
      180deg,
      rgba(255, 220, 140, 0.7) 0%,
      rgba(255, 180, 80, 0.4) 30%,
      rgba(255, 150, 50, 0.15) 60%,
      transparent 100%
    );
    border-radius: 50%;
    filter: blur(4px);
    animation: reflectShimmer 3s ease-in-out infinite alternate;
  }

  @keyframes reflectShimmer {
    0% { opacity: 0.5; transform: scaleY(1) scaleX(0.8); }
    100% { opacity: 0.8; transform: scaleY(1.15) scaleX(0.9); }
  }

  /* ===== 水杉树干 ===== */
  .trees-container {
    position: absolute;
    bottom: 34%;
    left: 0;
    width: 100%;
    height: 40%;
  }

  .tree {
    position: absolute;
    bottom: 0;
  }

  .trunk {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(180deg, #5d3a1e 0%, #3e2210 60%, #2a1508 100%);
    border-radius: 2px 2px 4px 4px;
    width: 5px;
  }

  .canopy {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 45px;
    height: 90px;
    background: linear-gradient(
      180deg,
      #d4453b 0%,
      #b8382e 20%,
      #c94a35 40%,
      #a83528 60%,
      #8b281e 80%,
      #6d1f16 100%
    );
    border-radius: 50% 50% 30% 30%;
    filter: blur(0.5px);
  }

  .canopy::after {
    content: '';
    position: absolute;
    top: -8px;
    left: -3px;
    width: 38px;
    height: 40px;
    background: #e05545;
    border-radius: 50%;
    opacity: 0.6;
  }

  /* 前景大水杉 */
  .tree-large .trunk { height: 130px; width: 7px; }
  .tree-large .canopy {
    width: 70px;
    height: 140px;
    bottom: 120px;
    background: linear-gradient(180deg, #e0553a 0%, #c44530 25%, #d04a35 45%, #b03528 65%, #8a2518 85%, #6a1c12 100%);
  }
  .tree-large .canopy::after {
    width: 55px;
    height: 60px;
    top: -12px;
    left: -5px;
    background: #e86850;
  }

  .tree-medium .trunk { height: 95px; width: 5px; }
  .tree-medium .canopy {
    width: 50px;
    height: 100px;
    bottom: 88px;
    background: linear-gradient(180deg, #d0483a 0%, #b8382e 30%, #c04030 50%, #9e3025 75%, #7a2218 100%);
  }
  .tree-medium .canopy::after {
    width: 40px;
    height: 45px;
    top: -10px;
    left: -2px;
    background: #dc5848;
  }

  .tree-small .trunk { height: 65px; width: 4px; }
  .tree-small .canopy {
    width: 35px;
    height: 70px;
    bottom: 60px;
    background: linear-gradient(180deg, #c84538 0%, #ad3528 40%, #9a3025 70%, #6e1e15 100%);
  }
  .tree-small .canopy::after {
    width: 28px;
    height: 32px;
    top: -6px;
    left: -1px;
    background: #d05040;
  }

  /* 远景小水杉 */
  .tree-distant .trunk { height: 40px; width: 3px; background: linear-gradient(180deg, #4a3020 0%, #2a1808 100%); }
  .tree-distant .canopy {
    width: 22px;
    height: 45px;
    bottom: 36px;
    background: linear-gradient(180deg, #b84035 0%, #953025 50%, #722018 100%);
  }
  .tree-distant .canopy::after {
    width: 18px;
    height: 22px;
    top: -5px;
    left: 0;
    background: #c05042;
    opacity: 0.5;
  }

  /* ===== 湖边芦苇 ===== */
  .reeds {
    position: absolute;
    bottom: 34%;
    left: 0;
    width: 100%;
    height: 8%;
  }

  .reed {
    position: absolute;
    bottom: 0;
    width: 2px;
    background: linear-gradient(180deg, #c4a46a 0%, #8a6d3f 60%, #5a3d1e 100%);
    border-radius: 50% 50% 0 0;
    transform-origin: bottom center;
    animation: reedSway 5s ease-in-out infinite;
  }

  .reed::after {
    content: '';
    position: absolute;
    top: -6px;
    left: -2px;
    width: 6px;
    height: 10px;
    background: #d4b878;
    border-radius: 50%;
    opacity: 0.7;
  }

  @keyframes reedSway {
    0%, 100% { transform: rotate(-2deg); }
    50% { transform: rotate(3deg); }
  }

  /* ===== 地面/岸线 ===== */
  .shore {
    position: absolute;
    bottom: 33%;
    left: 0;
    width: 100%;
    height: 3%;
    background: linear-gradient(180deg, #3d2a1a 0%, #2a1a0e 50%, #1a0e06 100%);
    border-radius: 60% 40% 0 0 / 100% 80% 0 0;
  }

  /* ===== 飞鸟 ===== */
  .bird {
    position: absolute;
    font-size: 14px;
    color: #1a1a2e;
    opacity: 0.7;
    animation: birdFly linear infinite;
  }

  @keyframes birdFly {
    0% { transform: translate(0, 0); }
    25% { transform: translate(100px, -30px); }
    50% { transform: translate(200px, -10px); }
    75% { transform: translate(300px, -40px); }
    100% { transform: translate(450px, -15px); }
  }

  /* ===== 文字标题 ===== */
  .title {
    position: absolute;
    top: 25px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.85);
    font-size: 36px;
    letter-spacing: 8px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5), 0 0 30px rgba(255,180,80,0.3);
    z-index: 10;
    pointer-events: none;
  }

  .subtitle {
    position: absolute;
    top: 72px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.55);
    font-size: 14px;
    letter-spacing: 4px;
    z-index: 10;
    pointer-events: none;
  }

  .credit {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.3);
    font-size: 11px;
    letter-spacing: 2px;
    z-index: 10;
  }

  /* ===== 雾气 ===== */
  .mist {
    position: absolute;
    bottom: 28%;
    left: -10%;
    width: 120%;
    height: 15%;
    background: radial-gradient(ellipse at center,
      rgba(255, 220, 180, 0.08) 0%,
      rgba(255, 200, 150, 0.04) 40%,
      transparent 70%
    );
    animation: mistDrift 12s ease-in-out infinite;
  }

  @keyframes mistDrift {
    0%, 100% { transform: translateX(-2%); opacity: 0.6; }
    50% { transform: translateX(2%); opacity: 1; }
  }

  /* ===== 星星 ===== */
  .stars {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 22%;
  }

  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle 3s ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.9; }
  }
</style>
</head>
